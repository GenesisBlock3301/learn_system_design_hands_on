services:
  app:
    image: ${IMAGE_NAME:genesisblock1033/infra-practice-app}:${TAG:-latest}
    container_name: infra-practice-app
    ports:
      - "${PORT:-8000}:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

    environment:
      - PYTHONUNBUFFERED=1
